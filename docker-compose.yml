services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VAULT_HOME=/app
    volumes:
      - vault_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vault_data:
